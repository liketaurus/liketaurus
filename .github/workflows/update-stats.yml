name: Update Stats
on:
  schedule:
    - cron: "0 0 * * *" # Щодня о 00:00
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          # ОБОВ'ЯЗКОВО: вкажіть тип картки (stats, top-langs, pin, або wakatime)
          card: stats
          # Вкажіть ваш логін та додаткові опції (як у URL оригінального проєкту)
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical
          # Шлях, куди зберегти файл
          path: stats.svg
          # Ваш секретний токен
          token: ${{ secrets.GH_TOKEN }}
      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "Update stats" || exit 0
          git push
